<!DOCTYPE html>
<html lang="pt-br">
<!-- aqui informamos a linguagem original  -->

<head>
    <!-- a tag head é uma tag de metadados, informações para outras informações. Exemplo, quais caracteres estou usando, o nome da página e a posiçao de elementos.  -->
    <meta charset="UTF-8" />
    <!-- charset >> conjunto de caracteres, como renderizar ç, til e outros caracteres  -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Essa tag instrui a renderizar a página para um dispositivo móvel  -->
    <title>Inicio do HTML (BICARTE)</title>
    <link rel="stylesheet" href="./style.css"/>
</head>

<body>
    <header>
        <nav>
            <span>
                <a href="#">bicarte</a>
            </span>
            <ul>
                <li>
                    <a href="#">Bicicletas</a>
                </li>
                <li>
                    <a href="#">Seguros</a>
                </li>
                <li>
                    <a href="#">Contato</a>
                </li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <div>
               <h1>Bicicletas feitas sob medida</h1> 
               <p>Bicicletas elétricas de alta precisão e qualidade, feitas sob medida para você. Explore o mundo na sua velocidade com a Bikcraft.</p>
               <button>escolha a sua</button>
            </div>
            <div>
                <img src="imagens/Imagem-01.jpg" alt="Imagem de uma bicicleta preta"/>
            </div>
        </section>
    </main>
</body>

</html>
